name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}|${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Skip check
        id: skip
        run: |
          if [ "${{ github.actor }}" = "github-actions[bot]" ] && [ "${{ github.head_ref }}" = "changeset-release/main" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Lint
        if: steps.skip.outputs.skip == 'false'
        run: pnpm lint

      - name: Format check
        if: steps.skip.outputs.skip == 'false'
        run: pnpm format:check

      - name: Test
        if: steps.skip.outputs.skip == 'false'
        run: pnpm test

      - name: Build
        if: steps.skip.outputs.skip == 'false'
        run: pnpm build

  e2e:
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Build showcase
        run: pnpm --filter @unextension/showcase build

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64

      - name: Run E2E tests
        run: xvfb-run --auto-servernum pnpm test:e2e
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/showcase-e2e/test-results/
          retention-days: 7

  deploy-docs:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - run: pnpm --filter @unextension/docs build
        env:
          SITE: https://nmerget.github.io
          BASE: /unextension

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/docs/dist

      - id: deployment
        uses: actions/deploy-pages@v4

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm build

      - uses: changesets/action@v1
        with:
          publish: pnpm release
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
